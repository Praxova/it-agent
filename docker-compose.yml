# ─────────────────────────────────────────────────────────────────
# Praxova IT Agent — Full Stack Docker Compose
# ─────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d --build            # Rebuild and start
#   docker compose logs -f admin-portal     # Follow portal logs
#   docker compose logs -f agent-helpdesk-01 # Follow agent logs
#   docker compose down                     # Stop everything
#   docker compose down -v                  # Stop and remove volumes
# ─────────────────────────────────────────────────────────────────

services:
  # ── Admin Portal (Blazor Server + REST API) ──────────────────
  admin-portal:
    build:
      context: .
      dockerfile: admin/dotnet/Dockerfile
    container_name: praxova-admin-portal
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      ASPNETCORE_URLS: "http://+:5000;https://+:5001"
      ASPNETCORE_ENVIRONMENT: Production
      Kestrel__Certificates__Default__Path: /app/certs/cert.pem
      Kestrel__Certificates__Default__KeyPath: /app/certs/key.pem
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/lucid-admin.db"
      Database__Provider: Sqlite
      Jwt__SecretKey: "${JWT_SECRET_KEY:-praxova-dev-secret-key-change-in-production-min32chars!}"
      ActiveDirectory__LdapServer: 172.16.119.20
      ActiveDirectory__Domain: montanifarms.com
      ActiveDirectory__SearchBase: "DC=montanifarms,DC=com"
      ActiveDirectory__Enabled: "true"
      PRAXOVA_AD_BIND_PASSWORD: "${PRAXOVA_AD_BIND_PASSWORD:-}"
    volumes:
      - ./docker/certs:/app/certs:ro
      - admin-data:/app/data
      - admin-logs:/app/logs
    restart: unless-stopped
    networks:
      - lucid-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health/"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Helpdesk Agent Instance 1 ────────────────────────────────
  agent-helpdesk-01:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: praxova-agent-helpdesk-01
    environment:
      ADMIN_PORTAL_URL: http://admin-portal:5000
      AGENT_NAME: test-agent
      POLL_INTERVAL: "30"
      HEARTBEAT_INTERVAL: "60"
      LOG_LEVEL: INFO
      SERVICENOW_USERNAME: admin
      SERVICENOW_PASSWORD: ${SERVICENOW_PASSWORD}
      OLLAMA_HOST: http://ollama:11434
    restart: unless-stopped
    networks:
      - lucid-net
    depends_on:
      admin-portal:
        condition: service_healthy
      ollama:
        condition: service_started

  # ── Ollama LLM Server ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: praxova-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - lucid-net

volumes:
  admin-data:
    name: praxova-admin-data
  admin-logs:
    name: praxova-admin-logs
  ollama-models:
    name: praxova-ollama-models

networks:
  lucid-net:
    name: praxova-network
    driver: bridge
