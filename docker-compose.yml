# ─────────────────────────────────────────────────────────────────
# Praxova IT Agent — Full Stack Docker Compose
# ─────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d --build            # Rebuild and start
#   docker compose logs -f admin-portal     # Follow portal logs
#   docker compose logs -f agent-helpdesk-01 # Follow agent logs
#   docker compose down                     # Stop everything
#   docker compose down -v                  # Stop and remove volumes
# ─────────────────────────────────────────────────────────────────

services:
  # ── Admin Portal (Blazor Server + REST API) ──────────────────
  admin-portal:
    image: praxova-admin:latest
    build:
      context: .
      dockerfile: admin/dotnet/Dockerfile
    container_name: praxova-admin-portal
    ports:
      - "5000:5000"
      - "5001:5001"
    env_file:
      - path: .env
        required: true
      # Production: unseal passphrase in a separate root-owned file.
      # Development: set PRAXOVA_UNSEAL_PASSPHRASE in .env instead.
      # See docs/security/unseal-configuration.md
      - path: /etc/praxova/unseal.env
        required: false
    environment:
      ASPNETCORE_URLS: "http://+:5000;https://+:5001"
      ASPNETCORE_ENVIRONMENT: Production
      Kestrel__Certificates__Default__Path: /app/data/certs/portal-cert.pem
      Kestrel__Certificates__Default__KeyPath: /app/data/certs/portal-key.pem
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/lucid-admin.db"
      Database__Provider: Sqlite
      PRAXOVA_AD_BIND_PASSWORD: "${PRAXOVA_AD_BIND_PASSWORD:-}"
    volumes:
      - admin-data:/app/data
      - admin-logs:/app/logs
    restart: unless-stopped
    networks:
      - lucid-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health/"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Helpdesk Agent Instance 1 ────────────────────────────────
  agent-helpdesk-01:
    image: praxova-agent:latest
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: praxova-agent-helpdesk-01
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      # Bootstrap URL — HTTP, used by docker-entrypoint.sh to fetch CA trust bundle from /api/pki/trust-bundle
      ADMIN_PORTAL_BOOTSTRAP_URL: http://admin-portal:5000
      # Runtime URL — HTTPS, used for all agent↔portal communication
      ADMIN_PORTAL_URL: https://admin-portal:5001
      AGENT_NAME: test-agent
      POLL_INTERVAL: "30"
      HEARTBEAT_INTERVAL: "60"
      LOG_LEVEL: INFO
      LUCID_API_KEY: "${LUCID_API_KEY:-}"
      SERVICENOW_USERNAME: admin
      SERVICENOW_PASSWORD: ${SERVICENOW_PASSWORD}
      OLLAMA_HOST: http://ollama:11434
    restart: unless-stopped
    networks:
      - lucid-net
    depends_on:
      admin-portal:
        condition: service_healthy
      ollama:
        condition: service_started

  # ── Ollama LLM Server ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: praxova-ollama
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - lucid-net

volumes:
  admin-data:
    name: praxova-admin-data
  admin-logs:
    name: praxova-admin-logs
  ollama-models:
    name: praxova-ollama-models

networks:
  lucid-net:
    name: praxova-network
    driver: bridge
